lang: ko

redis:
  host: localhost
  port: 6379

orchestrator:
  sparkCount: 3
  basePort: 8100
  sparkJarPath: spark-server.jar
  restartCooldownSeconds: 10
  instancesRootDir: instances
  sharedPluginsDir: plugins

network:
  mode: DIRECT
  velocitySecret: change-me

database:
  type: h2
  h2:
    url: jdbc:h2:./aether;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  mysql:
    host: localhost
    port: 3306
    database: aether
    username: root
    password: ""
    jdbcParams: useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
